# Runestone Gatekeeper Policy Configuration
#
# Each tool has a decision: allow | approve | deny
# - allow: Execute immediately
# - approve: Require human approval via Slack
# - deny: Block execution
#
# Additional constraints can be configured per tool.

tools:
  # Shell command execution
  shell.exec:
    decision: approve

    # Regex patterns to deny (matched against canonicalized args)
    deny_patterns:
      - "rm -rf"
      - "rm -r /"
      - "curl.*\\|.*sh"
      - "wget.*\\|.*sh"
      - "chmod 777"
      - "sudo"
      - "eval"
      - "> /dev/"

    # Allowed working directories (prefix match)
    allowed_cwd_prefixes:
      - "/tmp/"
      - "./data/"
      - "./output/"

    # Allowed commands (only simple commands permitted when set)
    # allowed_commands:
    #   - "ls"
    #   - "git"

    # Optional sandbox prefix (prepended to every command)
    # sandbox_command_prefix:
    #   - "firejail"
    #   - "--noprofile"
    #   - "--"

    # Optional user/group to run as (requires appropriate privileges)
    # run_as_uid: 1000
    # run_as_gid: 1000

    # Optional environment allowlist and overrides
    # env_allowlist:
    #   - "PATH"
    #   - "HOME"
    # env_overrides:
    #   NODE_ENV: "production"

    # Limits
    max_output_bytes: 1048576   # 1MB
    max_timeout_ms: 30000       # 30 seconds

  # File writing
  files.write:
    decision: approve

    # Allowed paths (prefix match)
    allowed_paths:
      - "/tmp/"
      - "./data/"
      - "./output/"

    # Denied file extensions
    deny_extensions:
      - ".env"
      - ".pem"
      - ".key"
      - ".crt"
      - ".p12"
      - ".pfx"
      - ".jks"

    # Limits
    max_size_bytes: 10485760    # 10MB

  # HTTP requests
  http.request:
    decision: allow

    # Allowed HTTP methods
    allowed_methods:
      - GET
      - POST

    # Blocked domains
    deny_domains:
      - pastebin.com
      - bit.ly
      - tinyurl.com
      - gist.github.com

    # Allowed domains (exact or suffix match)
    # allowed_domains:
    #   - "api.example.com"
    #   - ".example.org"

    # SSRF protection: blocked IP ranges (CIDR notation)
    deny_ip_ranges:
      - "127.0.0.0/8"      # Loopback
      - "10.0.0.0/8"       # Private Class A
      - "172.16.0.0/12"    # Private Class B
      - "192.168.0.0/16"   # Private Class C
      - "169.254.0.0/16"   # Link-local / Cloud metadata
      - "0.0.0.0/8"        # Current network

    # Limits
    timeout_ms: 30000           # Default for short upstream calls.
    max_timeout_ms: 180000      # Ceiling for per-call timeout_ms overrides (3 min).
    max_body_bytes: 1048576     # 1MB response body limit
    max_redirects: 3

    # Optional: nominal USD cost per successful call. When set, participates
    # in the budgets[] enforcement below. Leave unset for free/untracked tools.
    # cost_usd: 0.001

# Optional: sensitive-boundary rule overrides.
#
# A built-in rule pack ships in src/policy/sensitiveBoundaryDefaults.ts (see
# policies/sensitive-boundaries.yaml for the full reference dump). Defaults
# load automatically — you don't need to enumerate them here. Use this section
# only when you want to:
#   - REPLACE a default rule (use the same `id`)
#   - ADD a new rule (use a fresh `id`)
#   - WHITELIST a known-safe path/command via `effect: allow` on a default id
#
# Effects: allow | require_approval | deny
# Risk:    low | medium | high | critical
# Match must include at least one of `command_regex` or `path_regex`.
#
# sensitive_boundaries:
#   # Example 1: whitelist a dev fixture that touches the Keychain by id.
#   - id: keychain-read
#     effect: allow
#     tools: [shell.exec]
#     match:
#       command_regex: 'security find-generic-password -s "GatekeeperDevFixture"'
#     category: dev_whitelist
#     resource_class: credential_store
#     risk: low
#     message: "Test fixture for the Keychain integration suite."
#
#   # Example 2: add a custom rule for a secret manager not in the default pack.
#   - id: onepassword-cli-read
#     effect: require_approval
#     tools: [shell.exec]
#     match:
#       command_regex: '\bop\s+(read|item\s+get)\b'
#     category: secret_manager_access
#     resource_class: credential_store
#     risk: high
#     message: "Reading from 1Password CLI requires approval."
#     safer_alternative: "Stage the secret into a scoped env var instead."

# Optional: spending caps. Applied after other policy checks. Each rule sums
# spend across its scope and rejects (or soft-flags) calls that would exceed a
# ceiling. Spend is REAL per-token cost for proxied model calls (anthropic.proxy)
# and the nominal `cost_usd` for other tools.
#
# Budgets ship DISABLED on purpose (observe-first): watch /usage and /llm-usage
# for a week or two, then set caps around ~2x your observed p95 before enabling.
#
# budgets:
#   # ── actor scope: a rolling monthly-bill guardrail ───────────────────────
#   - name: researcher-daily
#     match:
#       actor_role: researcher
#     window: day          # hour | day | week
#     max_usd: 5.00
#     mode: hard           # hard (default): reject with BUDGET_EXCEEDED
#                          # soft: permit but log a risk flag
#
#   # ── run scope: cap a SINGLE agentic run, where recursive burn compounds ──
#   # Keyed on the actor's runId (set via x-runestone-run-id on the proxy, the
#   # client `runId`, GATEKEEPER_RUN_ID for the MCP server / hook, or actor.runId
#   # on /tool calls). Skipped for calls without a runId. Denies RUN_BUDGET_EXCEEDED
#   # at the action boundary — pair with require_approval for an approve-to-continue UX.
#   - name: per-run-cap
#     match:
#       actor_role: openclaw
#     scope: run
#     window: day          # bounds how far back to aggregate the run's calls
#     max_usd: 5.00        # stop a single run at $5 of real spend
#     max_tokens: 5000000  # …or 5M tokens
#     max_calls: 200       # …or 200 tool/model calls (kills recursive loops)
#     mode: hard
#
#   - name: specific-agent-hourly
#     match:
#       actor_name: pm-thesis-research
#     window: hour
#     max_usd: 1.00
