services:
  gatekeeper:
    build: .
    ports:
      - "3847:3847"
    environment:
      # GATEKEEPER_SECRET must be set — docker-compose reads it from .env
      # automatically. Generate one with `npm run bootstrap` or:
      #   openssl rand -base64 32 > /tmp/s && echo "GATEKEEPER_SECRET=$(cat /tmp/s)" >> .env
      - GATEKEEPER_SECRET=${GATEKEEPER_SECRET:?GATEKEEPER_SECRET is not set. Run `npm run bootstrap` or add it to .env (see .env.example).}
      - GATEKEEPER_HOST=0.0.0.0
      - DEMO_MODE=true
      - LOG_LEVEL=info
    volumes:
      # Uses policy.example.yaml out of the box. To customize:
      #   cp policy.example.yaml policy.yaml
      #   Then change this line to: ./policy.yaml:/app/policy.yaml:ro
      - ./policy.example.yaml:/app/policy.yaml:ro
      - gatekeeper-data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3847/health"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  gatekeeper-data:
